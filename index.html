<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AzeChecker | API Panel</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Hamburger Menü */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: var(--dark);
            color: white;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding-top: 70px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
        }

        .sidebar.active { left: 0; }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: #94a3b8;
            display: block;
            border-left: 4px solid transparent;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar a:hover, .sidebar a.active-link {
            background: #1e293b;
            color: white;
            border-left: 4px solid var(--primary);
        }

        .menu-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ana İçerik */
        .main-content {
            padding: 90px 20px 30px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        h2 { margin-bottom: 20px; font-size: 1.5rem; text-align: center; }

        .input-group { margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; color: #64748b; }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        /* Sonuç Paneli */
        #result-container {
            margin-top: 25px;
            background: #1e293b;
            border-radius: 10px;
            padding: 15px;
            display: none;
        }

        #result {
            color: #10b981;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <a href="#" onclick="setMode('adsoyad')">👤 Ad Soyad Sorgu</a>
        <a href="#" onclick="setMode('tc')">🆔 TC Sorgu</a>
        <a href="#" onclick="setMode('aile')">👨‍👩‍👧‍👦 Aile Sorgu</a>
        <a href="#" onclick="setMode('sulale')">🌳 Sülale Sorgu</a>
        <a href="#" onclick="setMode('gsmtc')">📱 GSM -> TC</a>
        <a href="#" onclick="setMode('tcgsm')">🆔 TC -> GSM</a>
    </div>

    <div class="main-content">
        <div class="card">
            <h2 id="panel-title">Ad Soyad Sorgu</h2>
            
            <div id="dynamic-inputs">
                </div>

            <button class="send-btn" onclick="sendQuery()">Sorgula</button>
            
            <div id="result-container">
                <div id="result"></div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'adsoyad';

        const config = {
            adsoyad: { title: "Ad Soyad Sorgu", fields: ["Ad", "Soyad", "İl", "İlçe"], url: "https://azechecker.xyz/apiler/adsoyad.php" },
            tc: { title: "TC Sorgu", fields: ["TC"], url: "https://azechecker.xyz/apiler/tc.php" },
            aile: { title: "Aile Sorgu", fields: ["TC"], url: "https://azechecker.xyz/apiler/aile.php" },
            sulale: { title: "Sülale Sorgu", fields: ["TC"], url: "https://azechecker.xyz/apiler/sulale.php" },
            gsmtc: { title: "GSM'den TC Sorgu", fields: ["GSM"], url: "https://azechecker.xyz/apiler/gsmtc.php" },
            tcgsm: { title: "TC'den GSM Sorgu", fields: ["TC"], url: "https://azechecker.xyz/apiler/tcgsm.php" }
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function setMode(mode) {
            currentMode = mode;
            const settings = config[mode];
            document.getElementById('panel-title').innerText = settings.title;
            const container = document.getElementById('dynamic-inputs');
            container.innerHTML = '';

            settings.fields.forEach(field => {
                container.innerHTML += `
                    <div class="input-group">
                        <label>${field}</label>
                        <input type="text" id="input-${field.toLowerCase()}" placeholder="${field} giriniz...">
                    </div>
                `;
            });

            document.getElementById('result-container').style.display = 'none';
            toggleMenu();
        }

        async function sendQuery() {
            const settings = config[currentMode];
            const resultDiv = document.getElementById('result');
            const resultContainer = document.getElementById('result-container');
            
            // Parametreleri topla
            let params = new URLSearchParams();
            settings.fields.forEach(field => {
                const val = document.getElementById(`input-${field.toLowerCase()}`).value;
                params.append(field.toLowerCase(), val);
            });

            resultContainer.style.display = 'block';
            resultDiv.innerText = "Sorgulanıyor... Lütfen bekleyin.";

            try {
                const response = await fetch(`${settings.url}?${params.toString()}`);
                const data = await response.text(); // JSON değilse .text() kullanıyoruz
                
                // Eğer API JSON dönüyorsa güzelleştirelim
                try {
                    const jsonData = JSON.parse(data);
                    resultDiv.innerText = JSON.stringify(jsonData, null, 2);
                } catch {
                    resultDiv.innerText = data;
                }
            } catch (error) {
                resultDiv.innerText = "Bağlantı Hatası: " + error.message;
            }
        }

        // İlk açılışta Ad Soyad modunu yükle
        window.onload = () => setMode('adsoyad');
    </script>
</body>
</html>
