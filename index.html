<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AzeChecker | API Panel</title>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --light: #f1f5f9; --card-bg: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--light); color: var(--dark); }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--dark); color: white; transition: 0.4s; z-index: 1000; padding-top: 70px; }
        .sidebar.active { left: 0; }
        .sidebar a { padding: 15px 25px; text-decoration: none; color: #94a3b8; display: block; border-left: 4px solid transparent; }
        .sidebar a:hover { background: #1e293b; color: white; border-left: 4px solid var(--primary); }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1001; background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; font-size: 24px; }
        .main-content { padding: 90px 20px 30px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; color: #64748b; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #result-container { margin-top: 25px; background: #1e293b; border-radius: 10px; padding: 15px; display: none; overflow: hidden; }
        #result { color: #4ade80; white-space: pre-wrap; font-family: monospace; font-size: 13px; word-break: break-all; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <a href="#" onclick="setMode('adsoyad')">👤 Ad Soyad Sorgu</a>
        <a href="#" onclick="setMode('tc')">🆔 TC Sorgu</a>
        <a href="#" onclick="setMode('aile')">👨‍👩‍👧‍👦 Aile Sorgu</a>
        <a href="#" onclick="setMode('sulale')">🌳 Sülale Sorgu</a>
        <a href="#" onclick="setMode('gsmtc')">📱 GSM -> TC</a>
        <a href="#" onclick="setMode('tcgsm')">🆔 TC -> GSM</a>
    </div>

    <div class="main-content">
        <div class="card">
            <h2 id="panel-title" style="text-align:center">Ad Soyad Sorgu</h2>
            <div id="dynamic-inputs"></div>
            <button class="send-btn" onclick="sendQuery()">Sorgula</button>
            <div id="result-container"><div id="result"></div></div>
        </div>
    </div>

    <script>
        let currentMode = 'adsoyad';
        // Proxy sunucusu (CORS hatasını aşmak için)
        const proxy = "https://api.allorigins.win/get?url=";

        const config = {
            adsoyad: { title: "Ad Soyad Sorgu", fields: ["ad", "soyad", "il", "ilce"], url: "https://azechecker.xyz/apiler/adsoyad.php" },
            tc: { title: "TC Sorgu", fields: ["tc"], url: "https://azechecker.xyz/apiler/tc.php" },
            aile: { title: "Aile Sorgu", fields: ["tc"], url: "https://azechecker.xyz/apiler/aile.php" },
            sulale: { title: "Sülale Sorgu", fields: ["tc"], url: "https://azechecker.xyz/apiler/sulale.php" },
            gsmtc: { title: "GSM'den TC", fields: ["gsm"], url: "https://azechecker.xyz/apiler/gsmtc.php" },
            tcgsm: { title: "TC'den GSM", fields: ["tc"], url: "https://azechecker.xyz/apiler/tcgsm.php" }
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function setMode(mode) {
            currentMode = mode;
            const settings = config[mode];
            document.getElementById('panel-title').innerText = settings.title;
            const container = document.getElementById('dynamic-inputs');
            container.innerHTML = '';
            settings.fields.forEach(f => {
                container.innerHTML += `<div class="input-group"><label>${f.toUpperCase()}</label><input type="text" id="in-${f}" placeholder="${f} girin..."></div>`;
            });
            document.getElementById('result-container').style.display = 'none';
            if(window.innerWidth < 768) toggleMenu();
        }

        async function sendQuery() {
            const settings = config[currentMode];
            const resDiv = document.getElementById('result');
            const resCont = document.getElementById('result-container');
            
            let params = new URLSearchParams();
            settings.fields.forEach(f => params.append(f, document.getElementById(`in-${f}`).value));

            resCont.style.display = 'block';
            resDiv.innerText = "Sorgulanıyor...";

            try {
                // API URL'sini Proxy üzerinden çağırıyoruz
                const finalUrl = `${settings.url}?${params.toString()}`;
                const response = await fetch(proxy + encodeURIComponent(finalUrl));
                const data = await response.json();
                
                // Proxy'den gelen veriyi işle
                resDiv.innerText = data.contents || "Veri bulunamadı.";
            } catch (error) {
                resDiv.innerText = "Hata oluştu! API sunucusu yanıt vermiyor olabilir.";
            }
        }
        window.onload = () => setMode('adsoyad');
    </script>
</body>
</html>
